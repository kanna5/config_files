<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">

<fontconfig>
    <alias>
        <family>sans-serif</family>
        <default>
            <family>Noto Color Emoji</family>
            <family>Hack Nerd Font Mono</family>
        </default>
    </alias>

    <alias>
        <family>serif</family>
        <default>
            <family>Noto Color Emoji</family>
            <family>Hack Nerd Font Mono</family>
        </default>
    </alias>

    <alias>
        <family>monospace</family>
        <default>
            <family>Noto Color Emoji</family>
            <family>Hack Nerd Font Mono</family>
        </default>
    </alias>
</fontconfig>
